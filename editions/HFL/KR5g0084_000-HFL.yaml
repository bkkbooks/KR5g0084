front:
  text: 雨暘氣候親機笙一
  hash: sha256:2e71829d48031fae44ea6915a55a6580798edd09763ef8e351025aea68e6e071
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5g0084_HFL_000-001a, image: hfl/1004/1004-004.png}
body:
  text: 太陽日未岀先拂晨於東方日出處驗之黑雲如雞卵如旗山陣烏罣罳龍頭蛇魚靈芝牡丹並應當日未申時有雷雨或紫黑雲穿貫日及在日上下並應當日若黑雲如魚鱗主有風三日後方應雷雨太陰月色紅明日大雷雨色青赤應明日有圓光大如車輪者明日大風三日後方應外有白雲結成圓光不甚明日亦大風天罡罡星紅色摇動雷雨青色摇動明日大煞伐星上若起白雲明日大雷星上若起黄雲炁貫文曲星大雷雨雲炁罩上或有白雲自斗中出明日大雷雨應未時白光恬靜明日决無北斗白雲遮斗明日大變應未申或斗上下有雲如魚鱗明日亦變白雲罩二星三星明日大雷雨斗中有雲炁如水波白色明日大風斗中上有雲如亂絮止有風斗下有黑雲擁上者當夜風雨生斗下斗口有紫黑炁三日後有雷雨青色應木日紅赤色應火日餘日雲霞同如黄雲貫斗不過三日大雨白雲炁貫斗亦在三日内雨黑雲炁貫斗立有風雨斗下有閃電過斗及斗口當夜有雨龍炁拂晨東方看有五色炁如線過西者當日風雨致雲興霧在中天而止者三日應晚日没有五色炁界過東方者三日應白虎早起東方有白炁近太陽不甚遠此乃自寅出申巳時隨日則未申時隨日應酉戌時有雷雨河炁有黑雲成塊大者有風其形如猪渡河黑雲如爛絮枯木若霞或遮太陰或在月下上應明日雷雨白雲如綿絮小雨鱗而自南至北者明日南風至别方同在日落後驗之雷牌拂晨看南方有黑雲最高者是謂之雷信明日巳午時至中天而散去應未申時東方雲頭高東方至餘皆同欻火出神霄發號令當日酉時烈風震雷大雨如注風沙拔木欻火下水府開旗發號令申酉現當夜子時發次日雷雨霶𩃱陸地波流欻火出司日初昇黑雲如鷄頭如旗山陣鳥罣罳龍頭蛇魚靈芝牡丹未申時雷雨如魚鱗止有風欻火駕衝巳午時出未時雷雨未時見申酉時應欻火會金虎帶雷殺出遊來日未申時大風雷雨誅人畜伐廟天昏地黑飛沙拔木掩日不開當日雷雨欻火會金虎出遊巳出午應申出酉應狂風驟雨乾上出有誅伐巽艮坤入無震坎雷電雨可畏離兌入善欻火出遊未申時雷雨大作陸地波流欻火帶白虎出遊來日早申時雷雨大作欻火會雷霆大煞名赤鷄紫鵝未初雷電大作折木誅人驟雨傾盆雷司化水頃刻雷電大作霖雨傾盆欻火號令雷部諸煞聽命未申時狂風飛沙走石雷電大作大雨伐廟邪拔樹天昏地黑欻火遣金虎傳令巳午日有暈外有雲形如龍蛇三日内雷雨大作東南方必伐廟邪誅兇惡之人欻火與太乙交會今日現來日狂風驟雨誅人伐廟拔樹欻火躔舍或成段或如布幕去千萬丈大旱狂風如此後閉日未申雷雨掩日雲帶望巽方擊人伐精微鳥現迹又名赤鼠遊城五六日南方如此夜天河中無雲久旱極不可祈禱天數也金火大殺會戰未時雷雨大作大震誅妖折木狂風冬月大雪無雲有雷聲北斗都水使者出遊風雨大作遍濟通流但有北斗在近或天河近二更時前後應九斗陽芒火鈴將軍擲火同赤鼠五六七月壬子至丁巳六日内有雲炁如此旱類不可祈禱乾精大煞黑龍如雲魚雙行度巽三日内風雨大作轟雷掣電誅妖惡伐畜人冬雪雷神出遊申酉戌亥子丑方現朔風大雪四方現形多則有雷電辛君出遊金虎大煞四方無雲而忽有黑雲如龍蛇或閉月來日未申時雷雨三處來掩月伐廟誅人子丑夜現掩月雪凍夏秋風雲雷雨電蟲蝗人遭劫春三月如電蛇多者六七月風雨多辛君與使者出遊來日未申時雷震霹靂風雨大作誅邪伐木辛君會雷霆大煞遊宫黑雲如龍蛇入月自艮來狂風驟雨伐木誅妖此方人民多災金虎大煞至宫春當時風雨夏秋眀日未申時雷雨暈多擊伐辛君遊月宫黑雲如蛇自兌入三日大雨使者領大雷五雷使者出遊即使者與五炁雷公也來日未申時雷雨大作使者會北斗都水使者來日未申戌亥時大雷伐樹誅邪擊人畜殺伐使者令天罡趕煞一二日雷雨大作白炁風伯朝斗來日刮地狂風飛沙走石雷雨使者會雷師出遊來日狂風大雨霹靂誅妖使者會都水水晶來日必主雷雨都水使者出遊來日未申時大雨作紫微察訪人三日内必主有雨天罡會太乙七日内大雨陸地成河霹靂伐廟誅精擊人畜太乙交宫黑炁如雲遍來朝斗黑雲蔽斗當夜雨開了來日未申時雨大風雷如霧冲斗口亦同青色光芒九九旱數不可祈禱蟲蝗大發光長使者如黑猪過河或成陣來日未申時大雷雨如天河中聲如風響名使者捲水來日大雨平地波流欻火展翅當日申酉時雷雨大作諸雷炁候天雷巽上起鬼門上震又其聲隱霹靂雷惟一聲入地此是天雷發撼欻火降其雲如鳳翅或鱗並現青雲之上至中天方黑或申日落山時現雲神雷降則鳴于東巽雷降其雲自東或巽或南平如一字或光或黑至中天則風雨大作或黑在中天一字白雲在巽則不雨水雷降其雲向上出黑雲或青雲出水波樣如此則風雨立至太歲雷降其雲一色極黑一邊略些白雲光彩如筆鋒移時暴雷迅風作也社令雷降其雲黯黑似淡黑雲中出粉白雲如畫若值天晴雨此雲現或雨陰現皆有大風雨作七日來復定局虛宿甲子庚子胃庚辰翌壬午角癸未亢乙酉房庚寅畢癸卯井癸亥璧奎宿甲子癸未尾庚寅室壬辰奎庚子鬼庚戌心壬子箕癸丑斗乙卯女畢宿甲子庚午星壬申翌癸酉軫乙亥亢庚寅胃癸丑危庚申畢壬戌參鬼宿甲子癸酉房庚辰虛壬午室庚寅參庚子氐壬寅心癸卯尾庚申奎翌宿甲子乙丑軫庚辰奎癸未昴癸卯女庚戌胃壬子畢癸亥張氐宿甲子庚午斗壬辰虛庚辰畢庚寅角壬辰氐癸巳房乙未尾庚戌參癸丑柳箕宿甲子庚午室癸巳斗庚子奎壬寅胃庚戌星庚申箕壬戌斗癸丑女寅乙波濤庚午火辰寅興浪己庚同巳如逢癸炎光發午未陽壬癸在通申上過庚陰半古房星觜室四番紅傾河畢觜奎婁璧翌軫亢箕斗化龍妙洞引妙洞隱顯運龍韜且會東來黑炁高雲陣開來開復合晩西重隱闇籠袍須知淡色相同晩水炁重更始見遭陽炁鬪機開合顯如箕如首氣雄豪或男或女兼牛畜不免加兵碎莫逃怒氣黑紅兼叱咤細明此理便堅牢北斗自上烏飛下三没餘存四示曹妙甚二存蒙彩上上存下没小風騷陽家纔退西鄰北未二條三或二操直上中衢斯是敵東西輪逼脚迢迢雲仍如堵高來半暗合乾坤也遇淘包了畢箕名吐舌年方癸丑黑猿號黑猿頭上逢雙品西南東行又戰鏖先著緋黄後披皂宣龍子字曰班鰲初初真學纔斯記更把靈樞辨唧嘈先天一炁雷霆玉章夫天禀星象地推五行列二十八宿之縱横有三百六雷之造化高明上覆日月星辰潜沉下載風雨龍神歲君之旱各有分野天炁下降地炁未升而先有雨天之至旱六九之旬日光未升日炁未動而先有雨號曰旱魃之神故乃天主旱也非運動身中之造化而合天地之造化何得而雨也太陽者乃欻火之神也太陰者乃都督猛吏之神也又有都水炎司者亦存其章矣若非斡旋不得報應雷首欻火律令君號曰白虎大煞神有日若或此煞現金剛犯著也成塵日傍黑炁如龍現定是須臾風雨興東升西入雲貫日戌亥未申雨作霖赤雞紫鵝在其中重則當日雷電冲狂風折木誅精怪霹靂威聲遍太空天旱之年看雨師雨師立脚重如山頃刻之間雷雨作黑雲未雨密虹生未申風雨定誅怪伐壇破廟震雷轟烏猪吐火有電神未申風雨及誅精重則雷霆轟霹靂冬九十月雪霜凝夏月南方雲似火嵯峨耿耿直冲天又無雲炁入天河九九之旱天數然甲申丙子陰霜現到此方知小雨天亥子之間肅靜觀黑牛半夜把河穿更看烏雲貫斗月此時風雨遍山川六甲晴空天主旱壬子丁巳赤龍現仰看天河星斗稀旱數當時雨難見清晨若被烏雲蔽黑翻皂纛不堪聲未申風雨雷霹靂伐壇破廟更誅精巳午日暈龍蛇現第三風雨迅雷鳴東南方上誅人鬼古木惡廟不留停太陰西没度巽方獨行明日生風雨雷電飛空定伐人更誅六畜妖邪鬼或是雙行度巽方號日乾精大煞神定主第三風雨至轟雷殺伐震乾坤烏衣如霞日不光或如幙布千萬丈號曰閼伯天地驚未申雷雨及風狂日在青天雲又侵龍行紅暈照乾坤忽然離去數十丈又有一輪紅日明二人相併一同行號曰雷霆前煞神未日見時申日雨狂風拔樹鬼遭刑旱數之年看木郞樞機神煞要推詳忽然兩脚隨山走數定今年旱數常列日青天數㸃翳三朝風雨未申霖猛風折樹誅精怪牛馬遭刑不孝人雲似亂壞大風作霧起遮天日月昏頃刻青天轟霹靂風雲雨澤遍山川霧炁遮天如龍現現則第三應未申寅日遶時辰日雨妖邪六畜受天刑清早東西雲似火猪牛形狀未申傾西北晚有雲遮日月蒙雲急雨當旬東南雲起如龍馬當日之間風雨隨西北有雲如鵞撲三朝申酉雨來期黑雲煙霧分輕重重則風雲霹靂聲烏潤如山形似獸先雷後雨不須疑霧露下山天欲雨重則三朝雷雨聲輕則七日傾益雨霧炁遮天七日霖日將晩雨旗脚現不然水炁過天津定主未申風雨至滿空霹靂更誅精雲如鵶績歸大嶺任是真仙雨也無更有一般堪笑處不知玄妙却書符太陰之宿猛吏神掌善伐惡定吉凶更號名爲金虎煞祈晴禱雨最通靈四望無雲日朗明忽然雲罩似龍形定主未申發報應有雨無雷分重輕黑雲未密月虹暈虹號流金大煞神破廟伐壇誅妖孽春宵風雨當時傾秋則未申當報應夏冬定主有淋淫月躔尾宿如龍現疾病災危驟雨傾狂風折樹飛沙石迅雷伐惡并誅人月圍星度天主旱春冬戌亥加子丑出則寒凝并雪凍雨雷電雹及嚴霜疾病蟲蝗人受苦東西南北細推詳月躔畢宿多風雨月黑兮爲天一精春正三四多龍現定主六七風雨頻日月昏暗多風雨月圍箕畢作狂風未申風雨震霹靂伐壇破石馬牛人月生霧炁如龍現子丑見時丑日霖不然寅卯成湖海未申戌亥伐妖精火雷之神北斗君掌握樞機定吉凶主管人民中統攝號曰陰陽大煞神陰陽大煞不堪說掌善伐惡不留停忽然興雲貫斗内戌亥未申風雨興古木惡廟遭霹靂羊人牛馬受天刑黑雲炁貫廉貞雨三日之間雷劈人白雲貫貪并巨曜大風無雨赤天晴黑雲炁貫禄存星來日未申風雨驚雷聲風雨震天地伐廟誅邪除惡鬼天威神煞更誅人雲似黑龜冲破軍破軍使見未申風雨興七日不能晴七日之間成湖海雷誅人畜石山精赤炁來朝貫斗中輕則未申風雨興重則雷霆施號令追精伐崇逞天刑白炁如飛冲北斗堪看雷雨定誅人二十四炁皆如此七十二候細推明雲炁雜興風雨作黑雲貫斗亦爲霖白雲如霧來冲射未申風雨返雷霆明月清風無㸃翳四岸無雲射斗星陰陽不動殺不現便是符靈也不靈南辰北斗推詳細尺寸高低分野分深辨吉凶星煞處定知方所莫差論五星若有清光色秃箒長拖十所旬畢勢炎炎禱不得災厄蟲蝗人受迍冬至前三并後四若也雷鳴并雪霖此處雷鳴此不吉東西南北一般論火星一宿出南方萬物生涯緫枯瘁此處星紅此處旱紅暈光射定吉凶火星箕畢多風雨餘者躔之主旱侵六甲風雲頻著眼知斯消息自心明早晚中秋勤著看天上無星旱數侵石潤水流天欲雨炎炁蒸薰近雨淋水炁升而魚躍淵螻蟻封穴雨時行蜈蚣晝現路上走來朝風雨未申轟虹霓西見當日雨未申誅伐樹妖精若還東見高低看有雲無雨旱魃精地炁升天三日雨天炁下降四時淋地不至天天不雨天不至地旱將侵夏見則秋無雨至春見六七雨淋淫夏月北方天作雨秋月南方雨後淋冬月南風天有雪久雨西風又放晴是章者乃元始玉書非凡俗之祕典得知者乃道根深重夙有因縁傳仁傳義傳德傳仙雷霆誓重不可輕傳運雷霆於掌上呼風雨於目前代天宣化濟物利人永爲身寳戒慎之焉雨暘氣候親機
